<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donate Items – SevaSetu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background-image:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("img6.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .donate-container {
      background: #fff;
      width: 420px;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon {
      text-align: center;
      font-size: 40px;
      margin-bottom: 10px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 14px;
    }

    label {
      font-size: 14px;
      color: #333;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 11px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      outline: none;
      font-size: 14px;
    }

    textarea {
      resize: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #27ae60;
      box-shadow: 0 0 5px rgba(39,174,96,0.4);
    }

    .donate-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .donate-btn:hover {
      background: linear-gradient(135deg, #219150, #27ae60);
    }

    .extras {
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="donate-container">
    <div class="icon">📦</div>
    <h2>Donate Items</h2>
    <p>Your unused items can bring smiles</p>

    <form onsubmit="submitItemDonation(event)">

      <div class="input-group">
        <label>Donor Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="input-group">
        <label>Item Name</label>
        <input type="text" placeholder="Clothes / Books / Food" required>
      </div>

      <div class="input-group">
        <label>Item Category</label>
        <select required>
          <option value="">Select category</option>
          <option>Clothes</option>
          <option>Food</option>
          <option>Books</option>
          <option>Medicines</option>
          <option>Stationery</option>
          <option>Others</option>
        </select>
      </div>

      <div class="input-group">
        <label>Quantity</label>
        <input type="number" placeholder="Enter quantity" required>
      </div>

      <div class="input-group">
        <label>Item Condition</label>
        <select required>
          <option value="">Select condition</option>
          <option>New</option>
          <option>Good</option>
          <option>Used</option>
        </select>
      </div>

      <div class="input-group">
        <label>Pickup Address</label>
        <textarea rows="3" placeholder="Enter pickup location" required></textarea>
      </div>

      <div class="input-group">
        <label>Contact Number</label>
        <input type="tel" placeholder="10-digit mobile number" required>
      </div>

      <button type="submit" class="donate-btn">Submit Donation</button>
    </form>

    <div class="extras">
      Thank you for contributing to SevaSetu ❤️
    </div>
  </div>

  <script>
    function submitItemDonation(e) {
      e.preventDefault();
      alert("Item donation submitted successfully! Our team will contact you soon ❤️");
    }
  </script>

</body>
</html>
