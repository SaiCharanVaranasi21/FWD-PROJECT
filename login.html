<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donation Platform – Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image:
        linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
        url("img1.jpeg");
      background-size: cover;
      background-position: center;
    }

    .login-container {
      background: #fff;
      width: 380px;
      padding: 35px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      animation: slideUp 0.8s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #2c3e50;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #777;
      margin-bottom: 25px;
    }

    .input-group {
      margin-bottom: 18px;
    }

    label {
      font-size: 14px;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1.5px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #27ae60;
      box-shadow: 0 0 5px rgba(39,174,96,0.4);
    }

    .error {
      color: red;
      font-size: 12px;
      display: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    .extras {
      text-align: center;
      margin-top: 15px;
    }

    .extras a {
      color: #27ae60;
      text-decoration: none;
    }

    .donation-icon {
      text-align: center;
      font-size: 40px;
      margin-bottom: 10px;
      color: #27ae60;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="donation-icon">❤️</div>
    <h2>Welcome Back</h2>
    <p>Login to continue your donations</p>

    <form id="loginForm">
      <div class="input-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@email.com" />
        <div class="error" id="emailError">Please enter a valid email address</div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extras">
      <p>New here? <a href="register.html">Create an account</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const emailError = document.getElementById("emailError");

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailPattern.test(email.value)) {
        emailError.style.display = "block";
        email.style.borderColor = "red";
        return;
      }

      if (password.value.trim() === "") {
        alert("Please enter your password");
        return;
      }

      if (password.value.length < 6) {
        alert("Password must be at least 6 characters");
        return;
      }

      emailError.style.display = "none";
      email.style.borderColor = "#27ae60";

      alert("Login Successful ❤️");
      window.location.href = "home.html";
    });
  </script>

</body>
</html>
